name: Sync to Akgosil3/UTCOPD

on:
  push:
    branches:
      - main
    paths:
      - 'docs/outpatient-treatment-curriculum/**'
      - 'platform/**'
  workflow_dispatch:

jobs:
  sync-to-utcopd:
    name: Publish curriculum + platform to Akgosil3/UTCOPD
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare standalone export tree
        run: |
          mkdir -p /tmp/utcopd-export/docs
          mkdir -p /tmp/utcopd-export/platform

          # UTC outpatient curriculum
          cp -r docs/outpatient-treatment-curriculum/. /tmp/utcopd-export/docs/

          # Therapy platform source (exclude build artifacts and dependencies)
          rsync -a --exclude='node_modules/' --exclude='dist/' platform/. /tmp/utcopd-export/platform/

          # Top-level README
          cp README.md /tmp/utcopd-export/README.md

      - name: Push to Akgosil3/UTCOPD
        env:
          UTCOPD_PUSH_TOKEN: ${{ secrets.UTCOPD_PUSH_TOKEN }}
        run: |
          cd /tmp/utcopd-export

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Sync from rehab360-compliance/Rehab360-compliance@${GITHUB_SHA}

Source: https://github.com/rehab360-compliance/Rehab360-compliance/commit/${GITHUB_SHA}

NOTE: This repository is a read-only mirror of the UTC curriculum and therapy
platform from the source repository. All changes must be made upstream;
direct commits here will be overwritten on the next sync."

          git remote add utcopd \
            "https://x-access-token:${UTCOPD_PUSH_TOKEN}@github.com/Akgosil3/UTCOPD.git"

          # Force-push so UTCOPD always reflects the canonical source
          git push --force utcopd HEAD:main
